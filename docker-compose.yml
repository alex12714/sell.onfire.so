version: '3.8'

services:
  sell-onfire-so:
    image: nginx:alpine
    container_name: sell-onfire-so
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sell-onfire-http.rule=Host(`sell.onfire.so`)"
      - "traefik.http.routers.sell-onfire-http.entrypoints=http"
      - "traefik.http.routers.sell-onfire-http.middlewares=redirect-to-https"
      - "traefik.http.routers.sell-onfire.rule=Host(`sell.onfire.so`)"
      - "traefik.http.routers.sell-onfire.entrypoints=https"
      - "traefik.http.routers.sell-onfire.tls=true"
      - "traefik.http.routers.sell-onfire.tls.certresolver=letsencrypt"
      - "traefik.http.services.sell-onfire.loadbalancer.server.port=80"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  coolify:
    external: true

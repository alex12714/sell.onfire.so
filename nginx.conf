limit_req_zone $http_x_forwarded_for zone=sell_limit:10m rate=30r/s;

server {
    listen 80;
    server_name sell.onfire.so buy.onfire.so market.onfire.so mercado.onfire.so marche.onfire.so markt.onfire.so mercato.onfire.so rynok.onfire.so tirgus.onfire.so rynek.onfire.so pazar.onfire.so souq.onfire.so bazaar.onfire.so ichiba.onfire.so shichang.onfire.so sijang.onfire.so marknad.onfire.so trh.onfire.so piata.onfire.so agora.onfire.so shuk.onfire.so soko.onfire.so pasar.onfire.so cho.onfire.so turg.onfire.so turgus.onfire.so tori.onfire.so bazar.onfire.so comprar.onfire.so vender.onfire.so compra.onfire.so venda.onfire.so acheter.onfire.so vendre.onfire.so kaufen.onfire.so verkaufen.onfire.so comprare.onfire.so vendere.onfire.so kopen.onfire.so verkopen.onfire.so kupit.onfire.so prodat.onfire.so pirkt.onfire.so pardot.onfire.so kupic.onfire.so sprzedac.onfire.so satin-al.onfire.so sat.onfire.so shira.onfire.so bai.onfire.so kharid.onfire.so bech.onfire.so kau.onfire.so uru.onfire.so mai.onfire.so gou.onfire.so sada.onfire.so palda.onfire.so kopa.onfire.so salja.onfire.so koupit.onfire.so prodat-cz.onfire.so cumpara.onfire.so vinde.onfire.so agorazo.onfire.so poleo.onfire.so liknot.onfire.so limkor.onfire.so nunua.onfire.so uza.onfire.so beli.onfire.so jual.onfire.so mua.onfire.so ban.onfire.so osta.onfire.so muua.onfire.so pirkti.onfire.so parduoti.onfire.so ostaa.onfire.so myy.onfire.so kupyty.onfire.so prodaty.onfire.so;
    root /usr/share/nginx/html;
    index index.html;

    limit_req zone=sell_limit burst=100 nodelay;

    # Security headers (allow indexing for SEO)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://storage1.onfire.so https: data:; connect-src 'self' https://api2.onfire.so; font-src 'self' https://fonts.gstatic.com;" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/html text/css text/javascript application/javascript application/json application/xml text/xml text/plain;

    location ~* \.(ico|gif|jpe?g|png|webp|svg|woff2?|ttf|eot|otf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

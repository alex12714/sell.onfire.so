limit_req_zone $binary_remote_addr zone=sell_limit:10m rate=120r/m;

server {
    listen 80;
    server_name sell.onfire.so;
    root /usr/share/nginx/html;
    index index.html;

    limit_req zone=sell_limit burst=40 nodelay;

    # Security headers (allow indexing for SEO)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://storage1.onfire.so https: data:; connect-src 'self' https://api2.onfire.so; font-src 'self' https://fonts.gstatic.com;" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/html text/css text/javascript application/javascript application/json application/xml text/xml;

    location ~* \.(ico|gif|jpe?g|png|webp|svg|woff2?|ttf|eot|otf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
